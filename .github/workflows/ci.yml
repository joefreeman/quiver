name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --all

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all -- -D warnings

  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM
        run: cd quiver-web && ./build.sh

      - name: Verify package.json was generated
        run: test -f quiver-web/pkg/package.json

      - name: Show generated package.json
        run: cat quiver-web/pkg/package.json

  tree-sitter:
    name: Tree-sitter grammar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: cd tree-sitter && npm install

      - name: Verify the committed parser matches grammar.js
        run: |
          cd tree-sitter
          npx tree-sitter generate
          git diff --exit-code src/ || {
            echo "::error::src/ is out of date. Run 'tree-sitter generate' in tree-sitter/ and commit the result."
            exit 1
          }

      - name: Run corpus tests
        run: cd tree-sitter && npx tree-sitter test

      - name: Parse all Quiver source files (grammar/parser sync guard)
        run: tree-sitter/scripts/check-corpus.sh
