name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Reads the toolchain version, components and targets from rust-toolchain.toml,
      # and caches the build (replacing a separate Swatinem/rust-cache step).
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Run tests
        run: cargo test --all

      - name: Check formatting
        run: cargo fmt --all -- --check

      # Build the formatter from this checkout and assert every committed .qv source is already
      # canonically formatted. `format --check` writes nothing and exits non-zero (listing each
      # offending file) if any would change.
      - name: Check Quiver formatting
        run: |
          cargo run --quiet --bin quiv -- format --check $(git ls-files '*.qv') || {
            echo "::error::Quiver sources are not formatted. Run 'quiv format' on the listed files and commit the result."
            exit 1
          }

      - name: Run clippy
        run: cargo clippy --all --all-targets -- -D warnings

  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM
        run: cd quiver-web && ./build.sh

      - name: Verify package.json was generated
        run: test -f quiver-web/pkg/package.json

      - name: Show generated package.json
        run: cat quiver-web/pkg/package.json

  tree-sitter:
    name: Tree-sitter grammar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: cd tree-sitter && npm install

      - name: Verify the committed parser matches grammar.js
        run: |
          cd tree-sitter
          npx tree-sitter generate
          git diff --exit-code src/ || {
            echo "::error::src/ is out of date. Run 'tree-sitter generate' in tree-sitter/ and commit the result."
            exit 1
          }

      - name: Run corpus tests
        run: cd tree-sitter && npx tree-sitter test

      - name: Parse all Quiver source files (grammar/parser sync guard)
        run: tree-sitter/scripts/check-corpus.sh
